apiVersion: apps/v1
kind: Deployment
metadata:
  name: storage-deployment
  namespace: microdrive
spec:
  replicas: 2
  selector:
    matchLabels:
      app: storage
  template:
    metadata:
      labels:
        app: storage
    spec:
      containers:
      - name: storage-service
        image: yegor222/microdrive-storage:latest
        imagePullPolicy: Never
        resources:
          requests:
            memory: "128Mi" 
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        ports:
        - containerPort: 55055
---
apiVersion: v1
kind: Service
metadata:
  name: storage-service
  namespace: microdrive
spec:
  selector:
    app: storage
  ports:
    - protocol: TCP
      port: 55055
      targetPort: 55055