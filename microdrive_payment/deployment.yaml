apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-deployment
  namespace: microdrive
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment
  template:
    metadata:
      labels:
        app: payment
    spec:
      containers:
      - name: payment-service
        image: yegor222/microdrive-payment:latest
        imagePullPolicy: Never
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        ports:
        - containerPort: 50051
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: microdrive
spec:
  selector:
    app: payment
  ports:
    - protocol: TCP
      port: 50051
      targetPort: 50051